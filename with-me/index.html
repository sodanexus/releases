    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--primary:#78a8c0;--card-bg: rgba(0,0,0,0.92);--text:#f5f0eb;--muted: rgba(245,240,235,0.75);}
    html,body{min-height:100%;font-family:'Inter',sans-serif;background:#000;color:var(--text);overflow-x:hidden;}

    #particles-canvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }
    .bg-cover{position:fixed;inset:0;z-index:0;overflow:hidden;}
    .bg-cover img{width:110%;height:110%;object-fit:cover;position:absolute;top:-5%;left:-5%;
      filter:blur(80px) saturate(130%) brightness(0.85);
      transform:scale(1.2);}
    .bg-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.35);}
    .page{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2rem 1rem 7rem;}
    .card{width:100%;max-width: 400px;background:var(--card-bg);backdrop-filter:blur(28px) saturate(160%);border:1px solid rgba(255,255,255,0.09);border-radius:20px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.7);animation:fadeUp .65s cubic-bezier(.22,1,.36,1) both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(32px);}to{opacity:1;transform:translateY(0);}}
    @keyframes coverReveal{from{opacity:0;transform:scale(1.08);}to{opacity:1;transform:scale(1);}}
    .cover-wrap{position:relative;aspect-ratio:1/1;overflow:hidden;}
    .cover-wrap img.cover{width:100%;height:100%;object-fit:cover;display:block;transition:transform .7s ease;}
    .cover-wrap:hover img.cover{transform:scale(1.05);}
    .cover-wrap{animation:coverReveal .9s cubic-bezier(.22,1,.36,1) both;}
    .cover-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 45%,rgba(0,0,0,0.30) 100%);}
    .cover-meta{position:absolute;bottom:1.25rem;left:0;right:0;text-align:center;}
    .cover-meta .artist{
      font-family:'Playfair Display', serif;
      font-weight:700;
      font-size:1.8rem;
      letter-spacing:0.02em;
    }
    .cover-meta .track{font-size:.82rem;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:.15rem;}
    .links-list{padding:.5rem 0 1rem;display:flex;flex-direction:column;}
    .link-row{opacity:0;animation:linkIn .4s cubic-bezier(.22,1,.36,1) forwards;}
    @keyframes linkIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
    .link-row{display:flex;align-items:center;gap:.9rem;padding:.85rem 1.5rem;text-decoration:none;color:var(--text);border-left:3px solid transparent;transition:border-color .2s;position:relative;z-index:0;}
    .link-row::after{content:'';position:absolute;inset:0;background:var(--bg,#111);opacity:0;transition:opacity .2s;z-index:-1;}
    .link-row:hover::after{opacity:1;}
    .link-row:hover{border-left-color:var(--accent);}
    .link-row{display:flex;align-items:center;gap:.9rem;padding:.85rem 1.5rem;text-decoration:none;color:var(--text);border-left:3px solid transparent;transition:border-color .2s;position:relative;z-index:0;}
    .link-row::after{content:'';position:absolute;inset:0;background:var(--bg,#111);opacity:0;transition:opacity .2s;z-index:-1;}
    .link-row:hover::after{opacity:1;}
    .link-row:hover{border-left-color:var(--accent);}
    .link-icon{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;}
    .link-icon img{display:block;opacity:.7;transition:opacity .2s;}
    .link-icon svg{display:block;opacity:.7;transition:opacity .2s;}
    .link-row:hover .link-icon img{opacity:1;}
    .link-row:hover .link-icon svg{opacity:1;}
    .link-name{flex:1;font-size:.95rem;}
    .link-action{font-size:.78rem;color:var(--muted);letter-spacing:.06em;display:flex;align-items:center;gap:.3rem;transition:color .2s;}
    .link-row:hover .link-action{color:var(--accent);}
    .arrow{width:14px;height:14px;}
    .divider{height:1px;background:rgba(255,255,255,0.06);margin:0 1.5rem .5rem;}
    .link-row.store-row{border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:.25rem;}
    .socials{display:flex;justify-content:center;gap:1rem;padding:1.25rem 1.5rem 1.5rem;border-top:1px solid rgba(255,255,255,0.06);}
    .social-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.07);display:grid;place-items:center;text-decoration:none;transition:background .2s,transform .2s;}
    .social-btn img,.social-btn svg{opacity:.5;transition:opacity .2s;display:block;}
    .social-btn:hover{background:var(--primary);transform:translateY(-2px);}
    .social-btn:hover img,.social-btn:hover svg{opacity:1;}
      /* ── Mobile tweaks ── */
    .page{padding-bottom:calc(4rem + env(safe-area-inset-bottom));padding-top:calc(2rem + env(safe-area-inset-top));}

    @media (max-width: 420px){
      .page{padding:1.25rem .85rem calc(3rem + env(safe-area-inset-bottom));}
      .card{border-radius:18px;}
      .link-row{padding:.8rem 1.1rem;gap:.75rem;}
      .link-name{font-size:.92rem;}
      .link-action{font-size:.75rem;}
      .cover-meta{bottom:1.05rem;}
      .cover-meta .artist{font-size:1.65rem;}
      .cover-meta .track{font-size:.76rem;letter-spacing:.12em;}
      .socials{gap:.85rem;padding:1.05rem 1.1rem 1.15rem;}
      .social-btn{width:36px;height:36px;}
    }

<script>

// ── Particules ────────────────────────────────────────────────────────────────
(function(){
  const canvas = document.getElementById('particles-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  // Couleur injectée depuis la cover via CSS variable ou fallback orange
  function getColor() {
    const style = getComputedStyle(document.documentElement);
    const primary = (style.getPropertyValue('--primary') || '').trim();
    if (primary && primary.startsWith('#') && primary.length >= 7) {
      const r = parseInt(primary.slice(1,3),16);
      const g = parseInt(primary.slice(3,5),16);
      const b = parseInt(primary.slice(5,7),16);
      if (!isNaN(r)) return [r,g,b];
    }
    return [255, 107, 26];
  }

  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function createParticle(fromBottom) {
    return {
      x: Math.random() * W,
      y: fromBottom ? H + Math.random() * 20 : Math.random() * H,
      r: Math.random() * 1.6 + 0.5,
      dx: (Math.random() - 0.5) * 0.4,
      dy: -(Math.random() * 1.2 + 0.6),
      alpha: Math.random() * 0.55 + 0.25,
      life: 0,
      maxLife: Math.random() * 280 + 180,
      offset: Math.random() * 100,
    };
  }

  function init() {
    resize();
    particles = Array.from({ length: 60 }, () => {
      const p = createParticle(false);
      p.life = Math.random() * p.maxLife;
      return p;
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const [r, g, b] = getColor();

    particles.forEach((p, i) => {
      const progress = p.life / p.maxLife;
      let opacity;
      if (progress < 0.12) {
        opacity = (progress / 0.12) * p.alpha;
      } else if (progress > 0.78) {
        opacity = ((1 - progress) / 0.22) * p.alpha;
      } else {
        opacity = p.alpha;
      }

      const wobble = Math.sin(p.life * 0.02 + p.offset) * 0.45;

      ctx.save();
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + Math.min(opacity, 1).toFixed(3) + ')';
      ctx.shadowColor = 'rgba(' + r + ',' + g + ',' + b + ',' + Math.min(opacity * 0.8, 1).toFixed(3) + ')';
      ctx.shadowBlur = p.r * 6;
      ctx.fill();
      ctx.restore();

      p.x += p.dx + wobble;
      p.y += p.dy;
      p.life++;

      if (p.life >= p.maxLife || p.y < -10) {
        particles[i] = createParticle(true);
      }
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init();
  draw();
})();
async function shareOrCopy(btn){
  const shareData = {
    title: document.title || 'Listen now',
    text: 'Listen now',
    url: window.location.href
  };

  // Try native share first (mobile) — partage le lien, pas l'image
  if (navigator.share){
    try{
      await navigator.share(shareData);
      return;
    }catch(_){
      // user cancelled or share failed -> fallback to copy
    }
  }

  // Fallback: copy link (Clipboard API -> execCommand)
  const original = btn.innerHTML;
  const okLabel = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> Link copied!';
  const failLabel = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v10"/><path d="M8 7l4-4 4 4"/><path d="M6 21h12"/></svg> Copy failed';

  async function clipboardCopy(text){
    if (navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
      return true;
    }
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly','');
    ta.style.position = 'fixed';
    ta.style.top = '-1000px';
    document.body.appendChild(ta);
    ta.select();
    try{
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    }catch(_){
      document.body.removeChild(ta);
      return false;
    }
  }

  const ok = await clipboardCopy(window.location.href);
  btn.classList.add('copied');
  btn.innerHTML = ok ? okLabel : failLabel;

  setTimeout(() => {
    btn.classList.remove('copied');
    btn.innerHTML = original;
  }, 2000);
}

</script>
