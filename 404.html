<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 | VIQ</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--primary:#ffae00;--card-bg:rgba(0,0,0,0.92);--text:#f5f0eb;--muted:rgba(245,240,235,0.75);}
    html,body{min-height:100%;font-family:'Inter',sans-serif;background:#000;color:var(--text);overflow-x:hidden;}
    #particles-canvas{position:fixed;inset:0;z-index:2;pointer-events:none;}
    .page{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;}
    .card{width:100%;max-width:400px;background:var(--card-bg);backdrop-filter:blur(28px) saturate(160%);border:1px solid rgba(255,255,255,0.09);border-radius:20px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.7);animation:fadeUp .65s cubic-bezier(.22,1,.36,1) both;padding:2.5rem 2rem 2rem;display:flex;flex-direction:column;align-items:center;text-align:center;gap:1.25rem;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(32px);}to{opacity:1;transform:translateY(0);}}
    .error-code{font-family:'Instrument Serif',serif;font-weight:700;font-size:5.5rem;line-height:1;color:var(--primary);letter-spacing:-0.02em;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;animation-delay:.1s;opacity:0;position:relative;}
    .error-code::after{content:'404';position:absolute;left:3px;top:0;color:rgba(255,255,255,0.12);clip-path:polygon(0 35%,100% 35%,100% 55%,0 55%);animation:glitch 5s infinite;animation-delay:1.5s;}
    @keyframes glitch{0%,88%,100%{transform:translateX(0);opacity:0;}90%{transform:translateX(-5px);opacity:1;}93%{transform:translateX(5px);opacity:1;}96%{transform:translateX(-2px);opacity:.6;}98%{transform:translateX(0);opacity:0;}}
    .error-title{font-family:'Instrument Serif',serif;font-weight:600;font-size:1.35rem;letter-spacing:.01em;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;animation-delay:.2s;opacity:0;}
    .error-sub{font-size:.88rem;color:var(--muted);line-height:1.65;letter-spacing:.02em;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;animation-delay:.3s;opacity:0;}
    .divider{width:40px;height:1px;background:rgba(255,255,255,0.12);animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;animation-delay:.35s;opacity:0;}
    .home-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.65rem 1.5rem;background:var(--primary);color:#000;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:400;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;border-radius:999px;transition:transform .2s, opacity .2s;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;animation-delay:.42s;opacity:0;}
    .home-btn:hover{transform:translateY(-2px);opacity:.85;}
    .home-btn svg{width:14px;height:14px;}
    .legal-footer{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.45);text-align:center;z-index:20;}
    .legal-footer a{color:rgba(255,255,255,0.55);text-decoration:none;}
    .legal-footer a:hover{color:rgba(255,255,255,0.9);text-decoration:underline;}
    @media(max-width:420px){.card{padding:2rem 1.5rem 1.75rem;}.error-code{font-size:4.5rem;}}
  </style>
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <div class="page">
    <div class="card">
      <div class="error-code">404</div>
      <div class="error-title">Page not found</div>
      <div class="divider"></div>
      <div class="error-sub">This page doesn't exist<br>or may have been moved.</div>
      <a href="https://www.viqmusic.net" class="home-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back to home
      </a>
    </div>
  </div>
  <div class="legal-footer">
    <a href="/mentions.html">Legal Notice</a> ·
    <a href="/privacy.html">Privacy Policy</a>
  </div>
<script>
(function(){
  const canvas = document.getElementById('particles-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  function getColor(){
    const style = getComputedStyle(document.documentElement);
    const primary = (style.getPropertyValue('--primary')||'').trim();
    if(primary && primary.startsWith('#') && primary.length>=7){
      const r=parseInt(primary.slice(1,3),16);
      const g=parseInt(primary.slice(3,5),16);
      const b=parseInt(primary.slice(5,7),16);
      if(!isNaN(r)) return [r,g,b];
    }
    return [255,174,0];
  }
  let W,H,particles=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function createParticle(fromBottom){
    return{x:Math.random()*W,y:fromBottom?H+Math.random()*20:Math.random()*H,
      r:Math.random()*1.6+0.5,dx:(Math.random()-.5)*.4,dy:-(Math.random()*1.2+.6),
      alpha:Math.random()*.55+.25,life:0,maxLife:Math.random()*280+180,offset:Math.random()*100};
  }
  function init(){resize();particles=Array.from({length:60},()=>{const p=createParticle(false);p.life=Math.random()*p.maxLife;return p;});}
  function draw(){
    ctx.clearRect(0,0,W,H);
    const[r,g,b]=getColor();
    particles.forEach((p,i)=>{
      const progress=p.life/p.maxLife;
      let opacity;
      if(progress<.12) opacity=(progress/.12)*p.alpha;
      else if(progress>.78) opacity=((1-progress)/.22)*p.alpha;
      else opacity=p.alpha;
      const wobble=Math.sin(p.life*.02+p.offset)*.45;
      ctx.save();ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba('+r+','+g+','+b+','+Math.min(opacity,1).toFixed(3)+')';
      ctx.shadowColor='rgba('+r+','+g+','+b+','+Math.min(opacity*.8,1).toFixed(3)+')';
      ctx.shadowBlur=p.r*6;ctx.fill();ctx.restore();
      p.x+=p.dx+wobble;p.y+=p.dy;p.life++;
      if(p.life>=p.maxLife||p.y<-10) particles[i]=createParticle(true);
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  init();draw();
})();
</script>
</body>
</html>
