    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--primary:#c04818;--card-bg: rgba(0,0,0,0.92);--text:#f5f0eb;--muted: rgba(245,240,235,0.75);}
    html,body{min-height:100%;font-family:'Inter',sans-serif;background:#000;color:var(--text);overflow-x:hidden;}
    .bg-cover{position:fixed;inset:0;z-index:0;overflow:hidden;}
    .bg-cover img{width:110%;height:110%;object-fit:cover;position:absolute;top:-5%;left:-5%;
      filter:blur(80px) saturate(130%) brightness(0.85);
      transform:scale(1.2);}
    .bg-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.75);}
    .page{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2rem 1rem 4rem;}
    .card{width:100%;max-width: 400px;background:var(--card-bg);backdrop-filter:blur(28px) saturate(160%);border:1px solid rgba(255,255,255,0.09);border-radius:20px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.7);animation:fadeUp .65s cubic-bezier(.22,1,.36,1) both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(32px);}to{opacity:1;transform:translateY(0);}}
    .cover-wrap{position:relative;aspect-ratio:1/1;overflow:hidden;}
    .cover-wrap img.cover{width:100%;height:100%;object-fit:cover;display:block;transition:transform .7s ease;}
    .cover-wrap:hover img.cover{transform:scale(1.05);}
    .cover-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 45%,rgba(0,0,0,0.30) 100%);}
    .cover-meta{position:absolute;bottom:1.25rem;left:0;right:0;text-align:center;}
    .cover-meta .artist{
      font-family:'Playfair Display', serif;
      font-weight:700;
      font-size:1.8rem;
      letter-spacing:0.02em;
    }
    .cover-meta .track{font-size:.82rem;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:.15rem;}
    .links-list{padding:.5rem 0 1rem;display:flex;flex-direction:column;}
    .link-row{display:flex;align-items:center;gap:.9rem;padding:.85rem 1.5rem;text-decoration:none;color:var(--text);border-left:3px solid transparent;transition:border-color .2s;position:relative;z-index:0;}
    .link-row::after{content:'';position:absolute;inset:0;background:var(--bg,#111);opacity:0;transition:opacity .2s;z-index:-1;}
    .link-row:hover::after{opacity:1;}
    .link-row:hover{border-left-color:var(--accent);}
    .link-row{display:flex;align-items:center;gap:.9rem;padding:.85rem 1.5rem;text-decoration:none;color:var(--text);border-left:3px solid transparent;transition:border-color .2s;position:relative;z-index:0;}
    .link-row::after{content:'';position:absolute;inset:0;background:var(--bg,#111);opacity:0;transition:opacity .2s;z-index:-1;}
    .link-row:hover::after{opacity:1;}
    .link-row:hover{border-left-color:var(--accent);}
    .link-icon{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;}
    .link-icon img{display:block;opacity:.7;transition:opacity .2s;}
    .link-icon svg{display:block;opacity:.7;transition:opacity .2s;}
    .link-row:hover .link-icon img{opacity:1;}
    .link-row:hover .link-icon svg{opacity:1;}
    .link-name{flex:1;font-size:.95rem;}
    .link-action{font-size:.78rem;color:var(--muted);letter-spacing:.06em;display:flex;align-items:center;gap:.3rem;transition:color .2s;}
    .link-row:hover .link-action{color:var(--accent);}
    .arrow{width:14px;height:14px;}
    .divider{height:1px;background:rgba(255,255,255,0.06);margin:0 1.5rem .5rem;}
    .link-row.store-row{border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:.25rem;}
    .socials{display:flex;justify-content:center;gap:1rem;padding:1.25rem 1.5rem 1.5rem;border-top:1px solid rgba(255,255,255,0.06);}
    .social-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.07);display:grid;place-items:center;text-decoration:none;transition:background .2s,transform .2s;}
    .social-btn img,.social-btn svg{opacity:.5;transition:opacity .2s;display:block;}
    .social-btn:hover{background:var(--primary);transform:translateY(-2px);}
    .social-btn:hover img,.social-btn:hover svg{opacity:1;}
      /* ── Mobile tweaks ── */
    .page{padding-bottom:calc(4rem + env(safe-area-inset-bottom));padding-top:calc(2rem + env(safe-area-inset-top));}

    @media (max-width: 420px){
      .page{padding:1.25rem .85rem calc(3rem + env(safe-area-inset-bottom));}
      .card{border-radius:18px;}
      .link-row{padding:.8rem 1.1rem;gap:.75rem;}
      .link-name{font-size:.92rem;}
      .link-action{font-size:.75rem;}
      .cover-meta{bottom:1.05rem;}
      .cover-meta .artist{font-size:1.65rem;}
      .cover-meta .track{font-size:.76rem;letter-spacing:.12em;}
      .socials{gap:.85rem;padding:1.05rem 1.1rem 1.15rem;}
      .social-btn{width:36px;height:36px;}
    }
  
    .legal-footer{

    .legal-footer a{

      text-decoration:none;
    }
    .legal-footer a:hover{
      color:rgba(255,255,255,0.9);
      text-decoration:underline;
    }
